---
# Workflow to scan secrets - API Keys, Credentials or other sensitive data
name: Secrets Scans
on:
  workflow_call:
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: run GitLeaks scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
